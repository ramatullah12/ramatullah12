name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ramatullah12

          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=0ea5e9&color_dots=e6edf3,dbeafe,93c5fd,60a5fa,2563eb
            dist/github-contribution-grid-snake-dark.svg?color_snake=a855f7&color_dots=161b22,1e293b,334155,475569,64748b

      - name: Push Snake Animation
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}