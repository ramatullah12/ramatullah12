name: Generate Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: ramatullah12

          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=38BDF8&color_dots=#ebedf0,#dbeafe,#93c5fd,#60a5fa,#2563eb
            dist/github-contribution-grid-snake-dark.svg?color_snake=A855F7&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353

      - name: Push Snake Animation
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}